name: Build and Deploy Discord Bot

on:
  push:
    branches: [ "main" ] # 当推送到 main 分支时触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # 例如: username/repo-name

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 内置 token，无需额外 secret

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. 拉取最新镜像
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            
            # 3. 停止并移除旧容器 (假设容器名为 discord-bot)
            docker stop discord-bot || true
            docker rm discord-bot || true
            
            # 4. 启动新容器
            # 注意：这里需要通过 --env-file 或 -e 传递敏感信息
            # 建议先在服务器上创建一个 .env 文件，或者直接在下面写 -e 参数
            docker run -d \
              --name discord-bot \
              --restart unless-stopped \
              --env-file /home/deploy/project/discord-bot/.env \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            
            # 5. 清理未使用的镜像 (可选，节省空间)
            docker image prune -f