name: Build and Deploy Discord Bot

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 【修改点 1】不再使用 metadata-action，而是直接在 build 步骤指定 tags
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 这里明确指定两个标签：
          # 1. latest: 用于部署时拉取“最新”版本
          # 2. sha: 用于备份，防止 latest 出错时可以回滚到具体某次提交
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 【修改点 2】明确拉取 :latest 标签
            # 这会拉取你在上一步构建并推送的那个“最新”镜像
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
             
            # 2. 停止并移除旧容器
            docker stop discord-bot || true
            docker rm discord-bot || true
            
            # 3. 启动新容器
            # 【修改点 3】运行 :latest 标签的镜像
            docker run -d \
              --name discord-bot \
              --restart unless-stopped \
              --env-file /home/deploy/projects/discord-bot/.env \
              -v /home/deploy/projects/discord-bot/data/db.sqlite3:/app/db.sqlite3 \
              -v /home/deploy/projects/discord-bot/logs:/app/logs \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
             
            # 4. 清理未使用的镜像
            docker image prune -f
